databaseChangeLog:
  - changeSet:
      id: 000-create-users-table
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - tableExists:
                tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_email
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_login
                  type: TIMESTAMP
              - column:
                  name: registered_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: directory_path
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
              - column:
                  name: coins
                  type: INTEGER
              - column:
                  name: trial_coins
                  type: INTEGER
              - column:
                  name: email_verified
                  type: BOOLEAN
              - column:
                  name: email_verification_token
                  type: VARCHAR(255)
              - column:
                  name: password_reset_token
                  type: VARCHAR(255)
              - column:
                  name: password_reset_token_expiry
                  type: TIMESTAMP
              - column:
                  name: auth_provider
                  type: VARCHAR(255)
              - column:
                  name: notifications
                  type: BOOLEAN
              - column:
                  name: is_customer
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: unsubscribe_token
                  type: VARCHAR(255)

  - changeSet:
      id: 000-create-generated-icons-table
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - tableExists:
                tableName: generated_icons
      changes:
        - createTable:
            tableName: generated_icons
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_generated_icons
                    nullable: false
              - column:
                  name: request_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: icon_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: service_source
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: grid_position
                  type: INTEGER
              - column:
                  name: generation_index
                  type: INTEGER
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: theme
                  type: TEXT
              - column:
                  name: icon_count
                  type: INTEGER
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: used_prompt_enhancer
                  type: BOOLEAN
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: is_original_grid
                  type: BOOLEAN
              - column:
                  name: icon_type
                  type: VARCHAR(255)
              - column:
                  name: is_watermarked
                  type: BOOLEAN
        - addForeignKeyConstraint:
            constraintName: fk_generated_icons_user
            baseTableName: generated_icons
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

