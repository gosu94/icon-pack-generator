databaseChangeLog:
  - changeSet:
      id: 001-add-users-is-customer
      author: codex
      validCheckSum: ANY
      preConditions:
        - not:
            columnExists:
              tableName: users
              columnName: is_customer
        - onFail: MARK_RAN
        - onError: HALT
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: is_customer
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
  - changeSet:
      id: 001-backfill-users-is-customer
      author: codex
      validCheckSum: ANY
      preConditions:
        - columnExists:
            tableName: users
            columnName: is_customer
        - onFail: MARK_RAN
        - onError: HALT
      changes:
        - update:
            tableName: users
            columns:
              - column:
                  name: is_customer
                  valueBoolean: false
            where: is_customer IS NULL
